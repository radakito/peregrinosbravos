<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etapa 02 · Machado · Peregrinos Bravos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --tierra: #2C1810;
  --ocre: #B5642A;
  --arena: #E8D5B0;
  --niebla: #F2EDE4;
  --tinta: #1A1208;
  --oro: #C9935A;
  --mar: #7BA7BC;
  --color: #3D5A47;
  --color-light: #B8D4C0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--niebla);
  color: var(--tinta);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 18px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* textura */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* NAV */
nav {
  background: var(--tierra);
  padding: 16px 30px;
  display: flex;
  gap: 12px;
}

nav a {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--arena);
  text-decoration: none;
  opacity: 0.7;
}

nav .current {
  color: var(--oro);
  opacity: 1;
}

/* HERO MACHADO */
.hero {
  background-image: url('machado.jpg');
  background-size: cover;
  background-position: center bottom;
  color: white;
  padding: 70px 30px 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
  filter: saturate(0.9) contrast(1.05);
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    rgba(181, 100, 42, 0.65),
    rgba(232, 213, 176, 0.75)
  );
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  height: 4px;
  width: 100%;
  background: var(--ocre);
}

.hero > * {
  position: relative;
  z-index: 2;
}

.etapa-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5em;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.7s forwards;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 8vw, 72px);
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.7s forwards 0.2s;
}

.hero .ruta {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  opacity: 0;
  animation: fadeUp 0.7s forwards 0.4s;
}

/* CONTENIDO */
.contenido {
  max-width: 720px;
  margin: 0 auto;
  padding: 70px 30px;
}

.section-mini-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--ocre);
  margin-bottom: 20px;
}

/* FOOTER */
footer {
  background: var(--tierra);
  color: var(--arena);
  text-align: center;
  padding: 40px;
}

/* animación */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Peregrinos Bravos</a>
  <span>›</span>
  <span class="current">Etapa 02</span>
</nav>

<div class="hero">
  <div class="etapa-num">Etapa 02</div>
  <h1>Antonio Machado</h1>
  <div class="ruta">Ruta simbólica del viaje</div>
</div>

<div class="contenido">

  <div class="section-mini-label">Texto</div>
  <p>
    Aquí puedes añadir el contenido de esta etapa...
  </p>

</div>

<footer>
  ← Volver
</footer>

</body>
</html>
